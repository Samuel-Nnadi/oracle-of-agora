<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oracle Admin | Signups</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-container {
      max-width: 1000px;
      margin: 120px auto;
      padding: 0 20px;
    }
    .admin-header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
    }
    .admin-table th, .admin-table td {
      padding: 16px 24px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .admin-table th {
      background: rgba(255, 255, 255, 0.03);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.4);
    }
    .admin-table tr:last-child td {
      border-bottom: none;
    }
    .admin-table tr:hover td {
      background: rgba(255, 255, 255, 0.01);
    }
    .login-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0c;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      text-align: center;
    }
    .login-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 16px;
      border-radius: 8px;
      color: white;
      margin-bottom: 20px;
      font-family: inherit;
    }
    .login-btn {
      width: 100%;
      background: white;
      color: black;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body class="dark-mode">

  <div id="login-overlay" class="login-overlay">
    <div class="login-card">
      <h2 style="margin-bottom: 24px; font-family: 'Instrument Serif', serif;">Admin Access</h2>
      <input type="password" id="admin-pass" class="login-input" placeholder="Enter Admin Secret" />
      <button id="login-btn" class="login-btn">Unlock Records</button>
    </div>
  </div>

  <div class="admin-container">
    <div class="admin-header">
      <div>
        <p class="section-eyebrow">Database</p>
        <h2 class="section-h2" style="margin: 0;">Newsletter Signups</h2>
      </div>
      <p class="form-note"><span id="signup-total">0</span> total entries recorded</p>
    </div>

    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Value (Email / .arc)</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="signup-list">
        <!-- JS populates -->
      </tbody>
    </table>
  </div>

  <script src="admin.js"></script>
</body>
</html>
